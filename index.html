<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About Me</h1>
    <hr />

    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 Who's my favorite Invincible character
        <select id="movie-answer">
          <option value="movie1">Mark</option>
          <option value="movie2">Cecil</option>
          <option value="movie3">Debbie</option>
          <option value="movie4">Eve</option>
        </select>
      </label>
      <button type="submit">Check Answer</button>
    </form>

    <div id="movie-result">
      <p id="movie-text"></p>

      <!-- 3 images -->
      <img id="img1" width="200" src="">
      <img id="img2" width="200" src="">
      <img id="img3" width="200" src="">
    </div>

    <hr />

    <!-- Show Question -->
    <form id="book-form">
      <label>
        📺 What is my favorite show?
        <select id="book-answer">
          <option value="book1">Invincible</option>
          <option value="book2">Avatar: The Last Airbender</option>
          <option value="book3">YOU</option>
          <option value="book4">Transformers: Prime</option>
        </select>
      </label>
      <button type="submit">Check Answer</button>
    </form>

    <div id="book-result">
      <p id="book-text"></p>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      

     //========================Movie Question jQuery Code


      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var answer = $("#movie-answer").val();

        if (answer === "movie3") {
          $("#movie-text").text("YAYYYYY!");

          $("#img1").attr("src", "https://pbs.twimg.com/media/GKV4kjqWUAAlmle.jpg");
          $("#img2").attr("src", "");
          $("#img3").attr("src", "");

          // animation dat is custom sobs and screams
          $("#img1").animate({
            width: "300px",
            marginLeft: "30px",
            opacity: 0.7
          }, 1500);

        } else if (answer === "movie2") {
          $("#movie-text").text("CLOSE.... 2nd fav");

          $("#img1").attr("src", "https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/05/Invincible-Cecil-Stedman-.jpeg");

          $("#img1").animate({
           width: "250px",
           marginLeft: "50px",
         }, 1500);


        } else if (answer === "movie1") {
          $("#movie-text").text("nah he a baddie tho");

          $("#img1").attr("src", "https://i.pinimg.com/736x/4c/14/a0/4c14a0da3308863ca53bee1451c3e871.jpg");

        } else {
          $("#movie-text").text("nuh uh she cool tho");

          $("#img1").attr("src", "https://i.pinimg.com/736x/fa/04/b4/fa04b4b73da01735ed6c8a28292595d6.jpg");
        }
      });

      //=======================Show Question jQuery Code

      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var answer = $("#book-answer").val();

        if (answer === "book2") {
          $("#book-text").text("YESSSS!");
        } else if (answer === "book4") {
          $("#book-text").text("clooossseeee i love ititititi");
        } else {
          $("#book-text").text("Try Again!");
        }

        

      });

      // extra mouseover yayayayayay
      $("img").mouseover(function () {
        $(this).css("border", "5px solid red");
      });

      $("img").mouseout(function () {
        $(this).css("border", "none");
      });

    </script>
  </body>
</html>
