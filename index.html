<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 Who's my favorite Invincible character
        <select id="movie-answer">
          <option value="movie1">Mark</option>
          <option value="movie2">Cecil</option>
          <option value="movie3">Debbie</option>
          <option value="movie4">Eve</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
      <img class ="movie-pic"
      width="210">
      <img class ="debbie-pic"
      width="210">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What is my favorite show?
        <select id="book-answer">
          <option value="book1">Invincible</option>
          <option value="book2">Avatar: The last airbender</option>
          <option value="book3">YOU</option>
          <option value="book4">Transformers: Prime </option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie3") {
          $("#movie-text").text("YAYYYYY!");
        } 
        else {
          $("#movie-text").text("nuh uh she cool tho");
        }
        if (answer === "movie2") {
          $("#movie-text").text("CLOSE.... 2nd fav");
          $(".movie-pic").attr("src", "https://static1.cbrimages.com/wordpress/wp-content/uploads/2021/05/Invincible-Cecil-Stedman-.jpeg")
          $(".movie-pic").animate({
            width: "250px",
            marginLeft: "50px",
          }, 1500);
        } 
        if (answer === "movie1") {
          $("#movie-text").text("nah he a baddie tho");
        } 
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book2") {
          $("#book-text").text("YESSSS!");
        } 
        else {
          $("#book-text").text("Try Again!");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
